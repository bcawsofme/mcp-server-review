name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ai-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout trusted agent code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          path: agent

      - name: Checkout PR workspace
        uses: actions/checkout@v4
        with:
          path: target

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run AI PR review
        working-directory: agent
        env:
          GH_TOKEN: ${{ github.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5' }}
          BUILD_RELEASE_MCP_REPO_ROOT: ${{ github.workspace }}/target
          AI_REVIEW_MAX_DIFF_BYTES: "180000"
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          python3 -m build_release_mcp.review_runner "$PR_URL" --post-comment
